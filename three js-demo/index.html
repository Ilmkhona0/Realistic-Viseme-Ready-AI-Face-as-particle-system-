<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Human Particle Face - Viseme & Emotion Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <img src="face.jpg" alt="Face" class="face-image" />
  </div>
  <div id="ui">
    <h2>Visemes</h2>
    <button onclick="setViseme('AI')">AI</button>
    <button onclick="setViseme('EH')">EH</button>
    <button onclick="setViseme('FV')">FV</button>
    <button onclick="setViseme('MM')">MM</button>
    <button onclick="setViseme(null)">Neutral</button>

    <h2>Emotions</h2>
    <label>Neutral <input type="range" min="0" max="1" step="0.01" value="1" oninput="setEmotion('neutral', this.value)"></label>
    <label>Joy <input type="range" min="0" max="1" step="0.01" value="0" oninput="setEmotion('joy', this.value)"></label>
    <label>Anger <input type="range" min="0" max="1" step="0.01" value="0" oninput="setEmotion('anger', this.value)"></label>
    <label>Surprise <input type="range" min="0" max="1" step="0.01" value="0" oninput="setEmotion('surprise', this.value)"></label>
    <label>Sadness <input type="range" min="0" max="1" step="0.01" value="0" oninput="setEmotion('sadness', this.value)"></label>
    <div id="emotionLabel">Current Emotion: Neutral</div>

    <h2>Eye Control</h2>
    <label>Gaze X <input type="range" min="-1" max="1" step="0.01" value="0" oninput="setGaze(this.value, null)"></label>
    <label>Gaze Y <input type="range" min="-1" max="1" step="0.01" value="0" oninput="setGaze(null, this.value)"></label>
  </div>

  <div id="canvas-container"></div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
